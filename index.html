<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Road Trip Trivia Engine - Pixel 8 Compact Edition</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<style>
  :root {
    --bg1: #07111f;
    --bg2: #0f172a;
    --panel: #111827;
    --card: #1e293b;
    --accent: #facc15;
    --blue: #38bdf8;
    --green: #22c55e;
    --red: #ef4444;
    --text: #f8fafc;
    --muted: #cbd5e1;
    --line: rgba(255,255,255,0.14);
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    margin: 0;
    min-height: 100%;
    background: linear-gradient(160deg, var(--bg1), var(--bg2));
    color: var(--text);
    font-family: Arial, Helvetica, sans-serif;
  }

  body {
    overscroll-behavior: none;
  }

  /* Pixel 8 compact phone frame: about 393 CSS pixels wide */
  .app {
    width: 100%;
    max-width: 393px;
    margin: 0 auto;
    min-height: 100vh;
    padding: 8px;
  }

  .panel {
    background: rgba(17, 24, 39, 0.96);
    border: 1px solid rgba(250, 204, 21, 0.35);
    border-radius: 18px;
    padding: 10px;
    box-shadow: 0 10px 28px rgba(0,0,0,0.35);
  }

  .topline {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 6px;
  }

  h1 {
    margin: 0;
    font-size: clamp(25px, 7vw, 34px);
    line-height: 0.98;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .tagline {
    color: var(--muted);
    font-size: 13px;
    margin: 4px 0 9px;
  }

  .screen { display: none; }
  .screen.active { display: block; }

  .menu-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
  }

  .mode-btn {
    width: 100%;
    text-align: left;
    color: #06111f;
    background: var(--accent);
    border: none;
    border-radius: 16px;
    padding: 12px;
    min-height: 76px;
    cursor: pointer;
    box-shadow: 0 5px 0 rgba(0,0,0,0.35);
  }

  .mode-btn:active {
    transform: translateY(2px);
    box-shadow: 0 3px 0 rgba(0,0,0,0.35);
  }

  .mode-title {
    font-weight: 900;
    font-size: clamp(19px, 5.2vw, 24px);
    line-height: 1.02;
  }

  .mode-desc {
    margin-top: 5px;
    font-size: 14px;
    font-weight: 700;
  }

  .mode-small {
    margin-top: 3px;
    font-size: 12px;
    opacity: 0.85;
  }

  .blue { background: var(--blue); }
  .green { background: var(--green); }
  .red { background: var(--red); color: white; }
  .dark { background: #334155; color: white; }

  .episode-select {
    display: grid;
    grid-template-columns: 1fr;
    gap: 7px;
    margin-top: 8px;
  }

  .episode-btn {
    border: 1px solid var(--line);
    border-radius: 14px;
    background: #020617;
    color: var(--text);
    padding: 10px 11px;
    text-align: left;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
  }

  .episode-btn span {
    display: block;
    color: var(--muted);
    font-size: 12px;
    margin-top: 3px;
    font-weight: 500;
  }

  .status-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px;
    margin: 6px 0 8px;
  }

  .pill {
    background: #020617;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 7px 8px;
    color: var(--muted);
    font-size: 11px;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 17px;
    padding: 12px;
    min-height: 210px;
  }

  .episode-line {
    color: var(--blue);
    font-size: 13px;
    font-weight: 800;
    margin-bottom: 6px;
  }

  .question {
    font-size: clamp(21px, 6vw, 27px);
    line-height: 1.14;
    font-weight: 900;
    margin: 6px 0 11px;
  }

  .countdown {
    min-height: 24px;
    font-size: clamp(16px, 4.3vw, 20px);
    color: var(--accent);
    font-weight: 800;
    margin-top: 7px;
  }

  .answer {
    display: none;
    font-size: clamp(19px, 5.4vw, 25px);
    color: var(--green);
    font-weight: 900;
    margin-top: 12px;
    line-height: 1.15;
  }

  .bonus {
    display: none;
    font-size: clamp(14px, 3.8vw, 18px);
    color: var(--muted);
    margin-top: 8px;
    line-height: 1.3;
  }

  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 7px;
    margin-top: 8px;
  }

  .control-btn {
    border: none;
    border-radius: 15px;
    min-height: 50px;
    padding: 9px;
    font-size: clamp(16px, 4.5vw, 20px);
    font-weight: 900;
    color: #06111f;
    background: var(--accent);
    cursor: pointer;
  }

  .control-btn.full { grid-column: span 2; }

  .settings {
    margin-top: 8px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 7px;
  }

  label {
    display: block;
    color: var(--muted);
    margin-bottom: 3px;
    font-size: 11px;
  }

  select, input {
    width: 100%;
    padding: 10px;
    border-radius: 11px;
    background: #020617;
    color: var(--text);
    border: 1px solid var(--line);
    font-size: 14px;
  }

  .note {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.3;
    margin-top: 8px;
  }

  .tiny {
    color: #94a3b8;
    font-size: 10.5px;
    line-height: 1.3;
    margin-top: 7px;
  }

  .back-btn {
    border: 1px solid var(--line);
    background: #020617;
    color: var(--text);
    border-radius: 11px;
    padding: 9px 10px;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    flex: 0 0 auto;
  }

  h2 {
    font-size: 22px;
  }

  @media (max-width: 360px) {
    .app { padding: 6px; }
    .panel { padding: 8px; border-radius: 16px; }
    .mode-btn { min-height: 70px; padding: 10px; }
    .mode-title { font-size: 18px; }
    .mode-desc { font-size: 13px; }
    .question { font-size: 20px; }
    .control-btn { min-height: 48px; font-size: 15px; }
  }

  @media (orientation: landscape) and (max-height: 520px) {
    .app { max-width: 760px; padding: 6px; }
    .panel { padding: 8px; }
    h1 { font-size: 24px; }
    .tagline { margin-bottom: 5px; }
    .menu-grid { grid-template-columns: 1fr 1fr; }
    .mode-btn { min-height: 68px; padding: 10px; }
    .card { min-height: 145px; }
    .question { font-size: 22px; }
    .control-btn { min-height: 44px; font-size: 16px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="panel">

    <div class="topline">
      <div>
        <h1>Road Trip Trivia</h1>
        <div class="tagline">Ask. Guess. Reveal. Score. Next.</div>
        <div class="topic-line" id="topicLine">Topic: One Piece Season 1</div>
      </div>
      <button class="back-btn" onclick="showScreen('menuScreen')">Home</button>
    </div>

    <div id="menuScreen" class="screen active">
      <div class="menu-grid">
        <button class="mode-btn" onclick="chooseMode('quick', 5)">
          <div class="mode-title">Quick Stop Pack</div>
          <div class="mode-desc">5 questions, 2 to 4 minutes</div>
          <div class="mode-small">Best for short rides, gas stops, younger kids</div>
        </button>

        <button class="mode-btn blue" onclick="chooseMode('episode', 10)">
          <div class="mode-title">Episode Adventure</div>
          <div class="mode-desc">10 questions, 6 to 10 minutes</div>
          <div class="mode-small">Recommended default road trip mode</div>
        </button>

        <button class="mode-btn green" onclick="chooseMode('long', 15)">
          <div class="mode-title">Long Haul Challenge</div>
          <div class="mode-desc">15 questions, 10 to 15 minutes</div>
          <div class="mode-small">Harder mix with bonus questions</div>
        </button>

        <button class="mode-btn red" onclick="chooseMode('grand', 25)">
          <div class="mode-title">Grand Adventure</div>
          <div class="mode-desc">20 to 25 questions</div>
          <div class="mode-small">Mixed episodes, bigger challenge, longer drive</div>
        </button>
      </div>

      <button class="mode-btn dark" style="margin-top:8px; min-height:60px;" onclick="resumeLastTrip()">
        <div class="mode-title">Resume Last Trip</div>
        <div class="mode-small">Return to the last saved question</div>
      </button>


    </div>

    <div id="episodeScreen" class="screen">
      <h2 style="margin:0 0 8px;color:var(--accent);">Choose Episode</h2>
      <div class="note" id="chosenModeNote"></div>
      <div class="episode-select" id="episodeList"></div>
    </div>

    <div id="gameScreen" class="screen">
      <div class="status-row">
        <div class="pill" id="packPill">Pack</div>
        <div class="pill" id="progressPill">Question 1</div>
        <div class="pill" id="scorePill">Score: 0</div>
        <div class="pill" id="timerPill">Auto answer</div>
      </div>

      <div class="card">
        <div class="episode-line" id="episodeLine">Episode</div>
        <div class="question" id="questionText">Press Start.</div>
        <div class="countdown" id="countdownText"></div>
        <div class="answer" id="answerText"></div>
        <div class="bonus" id="bonusText"></div>
      </div>

      <div class="controls">
        <button class="control-btn full" onclick="startCurrentQuestion()">Start / Repeat Question</button>
        <button class="control-btn green" onclick="markAnswer(true)">Correct</button>
        <button class="control-btn red" onclick="markAnswer(false)">Incorrect</button>
        <button class="control-btn green" onclick="showAnswer(true)">Show Answer</button>
        <button class="control-btn dark" onclick="pauseGame()">Pause</button>
        
      </div>

      <div class="settings">
        <div>
          <label for="pauseSeconds">Pause before answer</label>
          <input id="pauseSeconds" type="number" min="3" max="30" value="8">
        </div>
        <div>
          <label for="revealMode">Answer mode</label>
          <select id="revealMode">
            <option value="auto">Auto reveal answer</option>
            <option value="manual">Manual reveal only</option>
          </select>
        </div>
        <div>
          <label for="voiceSelect">Voice</label>
          <select id="voiceSelect"></select>
        </div>
      </div>

      <div class="tiny">
        Driver safety: the driver should listen only. A passenger should tap controls.
      </div>
      <div class="audio-status" id="audioStatus">Tap Start once to turn on audio.</div>
    </div>

  </div>
</div>

<script>
const triviaDeck = {
  title: "One Piece Season 1",
  category: "TV Series",
  description: "Netflix live-action Season 1 trivia deck"

  {e:8, q:"Who do the Straw Hats fight in the season finale?", a:"Arlong and the Arlong Pirates.", b:"The fight is about freeing Nami and Coco Village."},

let chosenMode = "episode";
let chosenCount = 10;
let activeEpisode = 1;
let currentQuestions = [];
let currentIndex = 0;
let score = 0;
let started = false;
let paused = false;
let timer = null;
let voices = [];
let topicAnnounced = false;
let audioReady = false;

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function chooseMode(mode, count) {
  chosenMode = mode;
  chosenCount = count;
  document.getElementById("chosenModeNote").textContent = modeLabel(mode) + " selected for " + triviaDeck.title + ". Choose an episode, or choose mixed episodes at the bottom.";
  buildEpisodeList();
  showScreen("episodeScreen");
  saveState();
}

function modeLabel(mode) {
  if (mode === "quick") return "Quick Stop Pack";
  if (mode === "episode") return "Episode Adventure";
  if (mode === "long") return "Long Haul Challenge";
  if (mode === "grand") return "Grand Adventure";
  return "Episode Adventure";
}

function buildEpisodeList() {
  const list = document.getElementById("episodeList");
  list.innerHTML = "";
  episodes.forEach(ep => {
    const btn = document.createElement("button");
    btn.className = "episode-btn";
    btn.innerHTML = "Season " + ep.season + " Episode " + ep.episode + ": " + ep.title + "<span>" + chosenCount + " question pack</span>";
    btn.onclick = () => startPack(ep.episode, false);
    list.appendChild(btn);
  });

  const mixed = document.createElement("button");
  mixed.className = "episode-btn";
  mixed.innerHTML = "Mixed " + triviaDeck.title + " Pack<span>Questions pulled from all episodes in this deck</span>";
  mixed.onclick = () => startPack(0, true);
  list.appendChild(mixed);
}


function shuffleArray(array) {
  const a = array.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startPack(episodeNumber, mixed) {
  activeEpisode = episodeNumber;
  score = 0;
  currentIndex = 0;

  let source = mixed ? shuffleArray(bank) : shuffleArray(bank.filter(x => x.e === episodeNumber));
  currentQuestions = source.slice(0, chosenCount);

  if (chosenMode === "grand") {
    currentQuestions = shuffleArray(bank).slice(0, Math.min(25, bank.length));
  }

  if (chosenMode === "quick") {
    currentQuestions = source.slice(0, 5);
  }

  if (currentQuestions.length === 0) currentQuestions = shuffleArray(bank).slice(0, 5);

  started = false;
  paused = false;
  topicAnnounced = false;
  showScreen("gameScreen");
  renderQuestion();
  saveState();
}

function renderQuestion() {
  const item = currentQuestions[currentIndex];
  const ep = episodes.find(x => x.episode === item.e);
  document.getElementById("episodeLine").textContent = "Season 1 Episode " + item.e + ": " + (ep ? ep.title : "Mixed Episode");
  document.getElementById("questionText").textContent = item.q;
  document.getElementById("answerText").style.display = "none";
  document.getElementById("bonusText").style.display = "none";
  document.getElementById("answerText").textContent = "";
  document.getElementById("bonusText").textContent = "";
  document.getElementById("countdownText").textContent = "";
  document.getElementById("packPill").textContent = modeLabel(chosenMode);
  document.getElementById("progressPill").textContent = "Question " + (currentIndex + 1) + " of " + currentQuestions.length;
  document.getElementById("scorePill").textContent = "Score: " + score + " / " + currentQuestions.length;
  document.getElementById("timerPill").textContent = document.getElementById("revealMode").value === "auto" ? "Auto answer" : "Manual answer";
  saveState();
}

function startCurrentQuestion() {
  started = true;
  paused = false;
  clearInterval(timer);

  const item = currentQuestions[currentIndex];
  renderQuestion();

  unlockAudio();

  const prompt = item.q;

  speak(prompt, () => {
    if (document.getElementById("revealMode").value === "auto") beginCountdown();
    else document.getElementById("countdownText").textContent = "Say your answer out loud. Press Answer Now when ready.";
  });
}

function beginCountdown() {
  clearInterval(timer);
  let seconds = Number(document.getElementById("pauseSeconds").value || 8);
  if (seconds < 3) seconds = 3;
  if (seconds > 30) seconds = 30;

  document.getElementById("countdownText").textContent = "Answer in " + seconds + " seconds.";
  timer = setInterval(() => {
    if (paused) return;
    seconds--;
    if (seconds > 0) {
      document.getElementById("countdownText").textContent = "Answer in " + seconds + " seconds.";
    } else {
      clearInterval(timer);
      showAnswer(false);
    }
  }, 1000);
}

function showAnswer(manual) {
  clearInterval(timer);
  if (!currentQuestions.length) return;
  const item = currentQuestions[currentIndex];

  const answer = document.getElementById("answerText");
  const bonus = document.getElementById("bonusText");
  answer.textContent = "Answer: " + item.a;
  answer.style.display = "block";

  if (item.b) {
    bonus.textContent = "Bonus: " + item.b;
    bonus.style.display = "block";
  }

  speak("The correct answer is " + item.a + (item.b ? " Bonus. " + item.b : ""));
}


function markAnswer(correct) {
  clearInterval(timer);
  cancelSpeech();

  if (!currentQuestions.length) return;

  if (correct) {
    score++;
    document.getElementById("scorePill").textContent = "Score: " + score + " / " + currentQuestions.length;
  }

  nextQuestion();
}

function nextQuestion() {
  clearInterval(timer);
  cancelSpeech();

  if (!currentQuestions.length) return;

  if (currentIndex < currentQuestions.length - 1) {
    currentIndex++;
    renderQuestion();
    startCurrentQuestion();
  } else {
    document.getElementById("questionText").textContent = "Pack complete.";
    document.getElementById("countdownText").textContent = "Final score: " + score + " out of " + currentQuestions.length + ". Choose Home for another pack.";
    document.getElementById("answerText").style.display = "none";
    document.getElementById("bonusText").style.display = "none";
    speak("Pack complete. Final score is " + score + " out of " + currentQuestions.length + ".");
  }
  saveState();
}

function pauseGame() {
  paused = !paused;
  if (paused) {
    cancelSpeech();
    document.getElementById("countdownText").textContent = "Paused.";
  } else {
    document.getElementById("countdownText").textContent = "Resumed.";
    speak("Game resumed.");
  }
}

function resetToMenu() {
  clearInterval(timer);
  cancelSpeech();
  localStorage.removeItem("rtt_android_state_v1");
  currentIndex = 0;
  score = 0;
  currentQuestions = [];
  showScreen("menuScreen");
}

function saveState() {
  const state = {
    chosenMode, chosenCount, activeEpisode, currentQuestions, currentIndex, score, topicAnnounced
  };
  localStorage.setItem("rtt_android_state_v1", JSON.stringify(state));
}

function resumeLastTrip() {
  const raw = localStorage.getItem("rtt_android_state_v1");
  if (!raw) {
    speak("No saved trip found. Choose a pack to begin.");
    return;
  }

  try {
    const state = JSON.parse(raw);
    chosenMode = state.chosenMode || "episode";
    chosenCount = state.chosenCount || 10;
    activeEpisode = state.activeEpisode || 1;
    currentQuestions = state.currentQuestions || [];
    currentIndex = state.currentIndex || 0;
    score = state.score || 0;
    topicAnnounced = state.topicAnnounced || false;

    if (!currentQuestions.length) {
      speak("No saved questions found. Choose a pack to begin.");
      return;
    }

    showScreen("gameScreen");
    renderQuestion();
    speak("Resuming last trip.");
  } catch(e) {
    speak("Saved trip could not be loaded. Choose a new pack.");
  }
}

function loadVoices() {
  if (!("speechSynthesis" in window)) return;

  voices = window.speechSynthesis.getVoices();
  const select = document.getElementById("voiceSelect");
  select.innerHTML = "";

  const ua=navigator.userAgent.toLowerCase();
  const isAndroid=ua.includes("android");
  const isWindows=ua.includes("windows");

  let preferred=-1;

  const auto=document.createElement("option");
  auto.value="auto";
  auto.textContent="Best Available Voice";
  select.appendChild(auto);

  voices.forEach((v,i)=>{
    const opt=document.createElement("option");
    opt.value=String(i);
    opt.textContent=v.name+" ("+v.lang+")";
    select.appendChild(opt);

    const name=v.name.toLowerCase();
    const lang=(v.lang||"").toLowerCase();

    if(isWindows && preferred===-1){
      if(
         name.includes("microsoft") &&
         name.includes("female")
      ){
        preferred=i;
      }
    }

    if(isAndroid && preferred===-1){
      if(
         name.includes("google") ||
         name.includes("samsung") ||
         lang==="en-gb"
      ){
         preferred=i;
      }
    }
  });

  select.value=(preferred!==-1)?String(preferred):"auto";

  const status=document.getElementById("audioStatus");
  if(status){
      if(isWindows){
          status.textContent="Windows voice detected";
      } else if(isAndroid){
          status.textContent="Android/Samsung voice detected";
      } else {
          status.textContent="Using best available voice";
      }
  }
}

function unlockAudio() {
  audioReady = true;
  const status = document.getElementById("audioStatus");
  if (status) status.textContent = "Audio ready.";

  if ("speechSynthesis" in window) {
    window.speechSynthesis.cancel();
    const freshVoices = window.speechSynthesis.getVoices();
    if (freshVoices && freshVoices.length) {
      voices = freshVoices;
    }
  }
}

function speak(text, callback) {
  if (!("speechSynthesis" in window)) {
    const status = document.getElementById("audioStatus");
    if (status) status.textContent = "Speech is not supported in this browser.";
    if (callback) callback();
    return;
  }

  if (!audioReady) unlockAudio();

  window.speechSynthesis.cancel();

  const u = new SpeechSynthesisUtterance(text);
  const selectedValue=document.getElementById("voiceSelect").value;

  if(selectedValue!=="auto"){
      const selected=Number(selectedValue);
      if(voices[selected]){
          u.voice=voices[selected];
          u.lang=voices[selected].lang||"en-GB";
      }
  }

  u.rate = 0.92;
  u.pitch = 1;
  u.volume = 1;

  u.onstart = () => {
    const status = document.getElementById("audioStatus");
    if (status) status.textContent = "Speaking...";
  };

  u.onend = () => {
    const status = document.getElementById("audioStatus");
    if (status) status.textContent = "Audio ready.";
    if (callback) callback();
  };

  u.onerror = () => {
    const status = document.getElementById("audioStatus");
    if (status) status.textContent = "Audio blocked. Tap Start / Repeat Question again.";
    if (callback) callback();
  };

  setTimeout(() => {
    window.speechSynthesis.speak(u);
  }, 80);
}

function cancelSpeech() {
  if ("speechSynthesis" in window) window.speechSynthesis.cancel();
}

window.addEventListener("load", () => {
  document.getElementById("topicLine").textContent = "Topic: " + triviaDeck.title;
  loadVoices();
  setTimeout(loadVoices, 500);
  setTimeout(loadVoices, 1200);
  if ("speechSynthesis" in window) window.speechSynthesis.onvoiceschanged = loadVoices;

  document.getElementById("voiceSelect").addEventListener("change", () => {
    const select = document.getElementById("voiceSelect");
    const status = document.getElementById("audioStatus");
    if (status) status.textContent = "Voice: " + select.options[select.selectedIndex].textContent;
  });
});
</script>
